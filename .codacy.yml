# Codacy configuration file
# Exclude some warnings that are acceptable during refactoring phase

exclude_paths:
  - "target/**"
  - "**/generated/**"
  - "**/bindings/**"
  - "examples/**"
  - "README.md"
  - "cli/README.md"

# Exclude some code quality checks (during refactoring phase)
exclude_patterns:
  - ".*unused.*"
  - ".*complexity.*"
  - ".*duplication.*"